<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stream Node - MR2</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="app-container">
        <h1 id="startup-text">Iniciando Sistema... (v4.0)</h1>
    </div>

    <video id="localVideo" autoplay playsinline muted></video>

    <div id="controls-overlay">
        
        <div id="audio-meter">
            <div id="audio-level"></div>
        </div>

        <select id="videoSource">
            <option value="">Buscando cámaras...</option>
        </select>
        <select id="audioSource">
            <option value="">Buscando micrófonos...</option>
        </select>
        <button id="startBtn">Encender Cámara</button>

        <hr style="border:0; border-top:1px solid #333; margin: 10px 0;">
        
        <div id="stream-info">
            Estado: <span id="connection-status" style="color: #ffcc00;">Conectando a servidor...</span><br>
            Sala ID: <span id="roomIdDisplay" style="color: #fff; font-weight: bold; user-select: all;">Generando...</span>
        </div>
        
        <button id="broadcastBtn" disabled>Esperando Cámara...</button>
    </div>

    <script src="js/camera.js"></script>
    <script src="js/webrtc.js"></script>
</body>
</html>
