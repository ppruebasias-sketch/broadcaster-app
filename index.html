<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stream Node - MR2</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="app-container">
        <h1 id="startup-text">Iniciando Sistema... (v2.0)</h1>
    </div>

    <video id="localVideo" autoplay playsinline muted></video>

    <div id="controls-overlay">
        
        <div id="audio-meter">
            <div id="audio-level"></div>
        </div>

        <select id="videoSource">
            <option value="">Buscando cámaras...</option>
        </select>
        <select id="audioSource">
            <option value="">Buscando micrófonos...</option>
        </select>
        <button id="startBtn">Encender Cámara</button>
    </div>

    <script src="js/camera.js"></script>
    <script src="js/webrtc.js"></script>
</body>
</html>
