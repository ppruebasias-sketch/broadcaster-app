<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stream Node - MR2</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="app-container">
        <h1 id="startup-text">Iniciando Sistema... (v8.1)</h1>
    </div>

    <div id="unmute-overlay" class="hidden">
        <div class="unmute-box">
            <p>🔊 Transmisión Recibida</p>
            <button id="unmuteBtn">Activar Audio en Producción</button>
        </div>
    </div>

    <video id="localVideo" autoplay playsinline muted></video>

    <div id="controls-overlay">
        <div id="audio-meter"><div id="audio-level"></div></div>

        <select id="videoSource"><option value="">Buscando cámaras...</option></select>
        <select id="audioSource"><option value="">Buscando micrófonos...</option></select>
        <button id="startBtn">Encender Cámara</button>

        <hr style="border:0; border-top:1px solid #333; margin: 10px 0;">
        
        <div id="stream-info">
            Estado: <span id="connection-status" style="color: #ffcc00;">Esperando cámara...</span><br>
            Sala: <span id="roomIdDisplay" style="color: #fff; font-weight: bold;">---</span>
        </div>
        <button id="broadcastBtn" disabled>Conexión Automática (Link)</button>

        <button id="toggleManualBtn" style="background: #444; margin-top: 10px; font-size: 12px; border: 1px solid #666;">Modo Manual Seguro (Sin Servidor) ▼</button>
        
        <div id="manual-ui" class="hidden" style="margin-top: 10px; padding: 10px; background: #1a1a1a; border-radius: 8px;">
            <p style="font-size: 11px; color: #aaa; margin-bottom: 5px;">1. Generar código y enviar a PC:</p>
            <button id="manualCopyOfferBtn" style="background: #e67e22;">📋 Copiar Mi Código Base64</button>
            
            <p style="font-size: 11px; color: #aaa; margin-top: 10px; margin-bottom: 5px;">2. Pegar respuesta del Estudio:</p>
            <input type="text" id="manualAnswerInput" placeholder="Pega respuesta aquí..." style="width: 100%; padding: 10px; border-radius: 6px; border: none; background: #333; color: white; margin-bottom: 5px;">
            <button id="manualConnectBtn" style="background: #34c759;">🔗 Forzar Conexión</button>
        </div>

        <div style="text-align: center; margin-top: 15px;">
            <a href="?mode=receptor" style="color: #007aff; font-size: 12px; text-decoration: none;">🖥️ Abrir como Estudio (Receptor)</a>
        </div>
    </div>

    <div id="receptor-manual-ui" class="hidden">
        <h2 style="margin-bottom: 15px;">Estudio Central (Modo Manual)</h2>
        <p style="color: #aaa; font-size: 14px; margin-bottom: 5px;">1. Pega el código del celular aquí:</p>
        <input type="text" id="recOfferInput" placeholder="Pega el código...">
        <button id="recProcessBtn" style="background: #007aff;">2. Procesar y Generar Respuesta</button>
        <div id="recStatus" style="margin-top: 15px; color: #34c759; font-weight: bold; font-size: 13px; word-break: break-all;">Esperando código...</div>
    </div>

    <script src="js/camera.js"></script>
    <script src="js/webrtc.js"></script>
</body>
</html>
